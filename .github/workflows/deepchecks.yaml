name: Deepchecks ML Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bibliotheken installieren
        run: |
          pip install --upgrade pip
          pip install numpy Pillow torch torchvision albumentations scikit-learn pandas
          pip install scikit-image pytorch-ignite deepchecks

      - name: Pipeline ausführen
        run: |
          cd lab04/deepchecks_intro
          python data.py
          python train.py
          python test.py

      - name: Bericht speichern
        uses: actions/upload-artifact@v4
        with:
          name: deepchecks-html-report
          path: lab04/deepchecks_intro/report.html